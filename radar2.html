<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Trackify Radar</title>

    <style>
        body {
            background: #0d0d0d;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #radar {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle, #0a0a0a 40%, #000 100%);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }

        #radar::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle, transparent 0%, transparent 45%, rgba(0, 255, 255, 0.15) 46%, transparent 47%),
                radial-gradient(circle, transparent 0%, transparent 70%, rgba(0, 255, 255, 0.1) 71%, transparent 72%),
                linear-gradient(to right, rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 35px 35px, 35px 35px;
            pointer-events: none;
        }

        #sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            background: conic-gradient(rgba(0, 255, 255, 0.4),
                    rgba(0, 255, 255, 0.0) 40deg);
            border-radius: 50%;
            mix-blend-mode: screen;
            transform-origin: center;
        }

        .pulse {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 0px;
            height: 0px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(0, 255, 255, 0.4);
            animation: pulseAnim 2.5s ease-out infinite;
        }

        @keyframes pulseAnim {
            0% {
                width: 0;
                height: 0;
                opacity: 0.8;
            }

            100% {
                width: 350px;
                height: 350px;
                opacity: 0;
            }
        }

        .dot {
            width: 18px;
            height: 18px;
            background: red;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px red;
        }

        .targetPulse {
            position: absolute;
            width: 0px;
            height: 0px;
            border-radius: 50%;
            border: 2px solid rgba(255, 0, 0, 0.6);
            transform: translate(-50%, -50%);
            animation: targetPulseAnim 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes targetPulseAnim {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }

            100% {
                width: 80px;
                height: 80px;
                opacity: 0;
            }
        }

        #player {
            width: 20px;
            height: 20px;
            background: cyan;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px cyan;
        }

        .crosshair {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to right, transparent calc(50% - 1px), rgba(0, 255, 255, 0.4) calc(50% - 1px), rgba(0, 255, 255, 0.4) calc(50% + 1px), transparent calc(50% + 1px)),
                linear-gradient(to bottom, transparent calc(50% - 1px), rgba(0, 255, 255, 0.4) calc(50% - 1px), rgba(0, 255, 255, 0.4) calc(50% + 1px), transparent calc(50% + 1px));
            pointer-events: none;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div id="ui-panel"
        style="position: absolute; top: 20px; left: 20px; z-index: 100; color: cyan; font-family: Arial, sans-serif; background: rgba(0,20,20,0.8); padding: 15px; border: 1px solid cyan; border-radius: 8px; box-shadow: 0 0 10px rgba(0,255,255,0.3);">
        <h3 style="margin: 0 0 10px 0; text-shadow: 0 0 5px cyan;">Radar Settings</h3>

        <div id="manual-rotation-container"
            style="margin-top: 5px; border-top: 1px solid rgba(0,255,255,0.3); padding-top: 10px;">
            <label style="font-size: 14px;">Manual Rotation (Testing): <span id="headingVal">0</span>Â°</label><br>
            <input type="range" id="manualHeading" min="0" max="360" value="0"
                style="width: 100%; margin-top: 5px; cursor: pointer;">
        </div>
    </div>

    <div id="radar">
        <div class="crosshair"></div>
        <div id="sweep"></div>
        <div id="radar-content"
            style="position: absolute; inset: 0; width: 100%; height: 100%; transform-origin: center;">
        </div>
        <div class="pulse"></div>
        <div id="player"></div>
    </div>

    <script>
        const radar = document.getElementById("radar");
        const radarContent = document.getElementById("radar-content");
        const sweep = document.getElementById("sweep");
        const radarRadius = 175;

        const player = { x: 0, y: 0 };

        let targets = [
            { x: 50, y: -80, dist: 12 },
            { x: -100, y: 40, dist: 25 },
            { x: 120, y: 150, dist: 35 }
        ];

        let sweepAngle = 0;
        const SWEEP_OFFSET = -90;
        let currentHeading = 0;

        const manualHeadingInput = document.getElementById("manualHeading");
        const headingVal = document.getElementById("headingVal");

        manualHeadingInput.addEventListener("input", (e) => {
            currentHeading = parseInt(e.target.value, 10);
            headingVal.innerText = currentHeading;
            radarContent.style.transform = `rotate(${-currentHeading}deg)`;
        });

        if (window.DeviceOrientationEvent) {
            window.addEventListener("deviceorientationabsolute", handleOrientation, true);
            window.addEventListener("deviceorientation", handleOrientation, true);
        }

        function handleOrientation(event) {
            let heading = null;
            if (event.webkitCompassHeading !== undefined) {
                heading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                heading = 360 - event.alpha;
            }

            if (heading !== null) {
                currentHeading = Math.round(heading);

                manualHeadingInput.value = currentHeading;
                headingVal.innerText = currentHeading;

                radarContent.style.transform = `rotate(${-currentHeading}deg)`;
            }
        }

        function updateRadar() {
            sweepAngle = (sweepAngle + 1.2) % 360;
            sweep.style.transform = `rotate(${sweepAngle}deg)`;

            document.querySelectorAll(".dot").forEach(d => d.remove());
            document.querySelectorAll(".dist-label").forEach(d => d.remove());

            let closestTarget = null;
            targets.forEach(t => {
                if (!closestTarget || t.dist < closestTarget.dist) {
                    closestTarget = t;
                }
            });

            targets.forEach(t => {
                const dx = t.x - player.x;
                const dy = t.y - player.y;

                const distance = Math.min(Math.sqrt(dx * dx + dy * dy), radarRadius);

                const angle = Math.atan2(dy, dx);
                const angleDeg = (angle * 180 / Math.PI + 360) % 360;

                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                const dot = document.createElement("div");
                dot.className = "dot";
                dot.style.left = (radarRadius + x) + "px";
                dot.style.top = (radarRadius + y) + "px";

                if (t === closestTarget && t.dist !== undefined) {
                    const label = document.createElement("div");
                    label.className = "dist-label";
                    label.innerText = Math.round(t.dist) + "m";
                    label.style.position = "absolute";
                    label.style.transform = `translate(-50%, -50%) rotate(${currentHeading}deg)`;
                    label.style.left = (radarRadius + x + 25) + "px";
                    label.style.top = (radarRadius + y - 10) + "px";
                    label.style.color = "lime";
                    label.style.fontFamily = "Arial, sans-serif";
                    label.style.fontSize = "13px";
                    label.style.fontWeight = "bold";
                    label.style.textShadow = "0px 0px 5px black, 0px 0px 5px black";
                    label.style.pointerEvents = "none";
                    radarContent.appendChild(label);
                }

                const visualSweep = (sweepAngle + SWEEP_OFFSET + 360) % 360;

                const dotVisualAngle = (angleDeg - currentHeading + 360) % 360;

                let diff = Math.abs(visualSweep - dotVisualAngle);
                if (diff > 180) diff = 360 - diff;

                if (diff < 10) {
                    const pulse = document.createElement("div");
                    pulse.className = "targetPulse";
                    pulse.style.left = dot.style.left;
                    pulse.style.top = dot.style.top;

                    radarContent.appendChild(pulse);

                    setTimeout(() => pulse.remove(), 800);
                }

                radarContent.appendChild(dot);
            });

            requestAnimationFrame(updateRadar);
        }

        updateRadar();
    </script>

</body>

</html>
